name: leerness.com pipeline

# 수동 실행(중요 업데이트 시) 또는 leerness 릴리스 후 repository_dispatch 로 트리거.
# 트리거 정책: "중요 업데이트 큐레이션" — curate.cjs 가 important 미게시 건만 선별.
on:
  # 매일 자동: 사이트만 최신 CHANGELOG 로 재빌드+배포(영상은 쿼터 보호로 제외 — 수동/릴리스 트리거에서만)
  schedule:
    - cron: '0 18 * * *'   # 매일 03:00 KST (UTC 18:00)
  workflow_dispatch:
    inputs:
      render_limit:
        description: '렌더/업로드할 최대 영상 수(쿼터 보호)'
        default: '4'
      skip_upload:
        description: 'YouTube 업로드 건너뛰기(true/false)'
        default: 'false'
  repository_dispatch:
    types: [leerness-release]

permissions:
  contents: write   # published.json 커밋백

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # UR-0034 컷오버: hyperframes 는 Node 22+
          cache: 'npm'

      - name: FFmpeg 설치 (hyperframes 렌더/썸네일 필수)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: CHANGELOG 가져오기 (leerness 레포 — API raw, CDN 캐시 우회)
        # UR-0165: raw.githubusercontent 는 ~5분 CDN 캐시라 방금 배포한 신규 버전이 누락될 수 있음(플래그십 릴리스 영상 지연).
        #   GitHub API contents(raw) 는 캐시-프레시 → 최신 CHANGELOG 보장. 실패 시 캐시버스트 raw 로 폴백.
        run: |
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.raw" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/gugu9999gu/leerness/contents/CHANGELOG.md" -o CHANGELOG.source.md \
            || curl -fsSL "https://raw.githubusercontent.com/gugu9999gu/leerness/main/CHANGELOG.md?cb=$(date +%s)" -o CHANGELOG.source.md
          head -1 CHANGELOG.source.md

      - name: 의존성 설치
        run: npm ci

      - name: 파싱 + 큐레이션
        run: |
          node pipeline/parse-changelog.cjs --changelog ./CHANGELOG.source.md
          node pipeline/curate.cjs --limit ${{ github.event.inputs.render_limit || '4' }}

      - name: Astro 빌드
        # 파싱+큐레이션 단계에서 이미 releases.json 생성됨 — site:build 는 parse 를 기본경로(CI 엔 없는 leerness-pkg)로 재실행하므로 astro build 만 수행.
        run: npx astro build

      - name: Cloudflare Pages 배포 (production = --branch main)
        # 근본원인 수정(2026-06-16): --branch 누락 시 wrangler 가 CI(detached HEAD)에서 production 브랜치
        #   추론에 실패해 preview(<hash>.leerness-site.pages.dev)로만 배포됨 → leerness.com(production) 이
        #   옛 배포(1.27.2)에 동결됐는데 continue-on-error 가 'success' 로 silent 마스킹(green-but-stale).
        #   --branch=main 으로 production 배포 강제 + continue-on-error 제거 → 배포 실패를 run 실패로 가시화.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name leerness-site --branch=main --commit-dirty=true

      - name: 배포 검증 (production 이 최신 버전 노출 — CDN 재시도)
        # preview 동결 재발 방지: 방금 빌드한 releases.json 최신 버전이 live production(leerness.com)에
        #   실제 노출되는지 CDN 전파를 감안해 재시도 확인. 불일치 시 exit 1 로 run 실패(정직성: green-but-stale 차단).
        run: node pipeline/verify-deploy.cjs --url https://leerness.com

      # schedule(매일): 백로그 소량 드립(limit 3, 쿼터보호). 멱등 — 이미 게시된 건 자동 스킵. dispatch: 입력값.
      # UR-0034 컷오버: Remotion → HyperFrames. render-shorts-hf 가 data/rendered.json(썸네일 포함) 을 생성 → verify-video/upload 가 그대로 사용.
      # 2026-06-12 사용자 지시: 영상 생성 당분간 중지 — 재개하려면 레포 변수 LEERNESS_VIDEO_ENABLED=true 설정 (사이트 빌드/배포는 계속 동작).
      - name: HyperFrames 숏츠 렌더 (KO+EN)
        if: ${{ vars.LEERNESS_VIDEO_ENABLED == 'true' }}
        run: |
          npx -y hyperframes@latest doctor || true
          node pipeline/render-shorts-hf.cjs --limit ${{ github.event_name == 'schedule' && '3' || github.event.inputs.render_limit || '4' }}

      # UR-0029: 업로드 전 품질 게이트 — 내용(복붙 아님)·BGM·효과음(무음/클리핑)·mp4 스트림(1080x1920·오디오·길이) 검증. FAIL 시 exit 1 로 업로드 차단.
      - name: 영상 검증 (content·BGM·효과음·스트림)
        if: ${{ vars.LEERNESS_VIDEO_ENABLED == 'true' }}
        run: node pipeline/verify-video.cjs --limit ${{ github.event_name == 'schedule' && '3' || github.event.inputs.render_limit || '4' }}

      - name: YouTube 업로드 (멱등 · privacy 변수)
        if: ${{ vars.LEERNESS_VIDEO_ENABLED == 'true' && github.event.inputs.skip_upload != 'true' }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # 공개로 전환하려면 레포 변수 LEERNESS_VIDEO_PRIVACY=public 설정 (기본 unlisted)
          PRIVACY: ${{ vars.LEERNESS_VIDEO_PRIVACY || 'unlisted' }}
        run: |
          printf 'YOUTUBE_CLIENT_ID=%s\nYOUTUBE_CLIENT_SECRET=%s\nYOUTUBE_REFRESH_TOKEN=%s\n' "$YOUTUBE_CLIENT_ID" "$YOUTUBE_CLIENT_SECRET" "$YOUTUBE_REFRESH_TOKEN" > .env
          node pipeline/upload-youtube.cjs --limit ${{ github.event_name == 'schedule' && '3' || github.event.inputs.render_limit || '4' }} --privacy "$PRIVACY"
          rm -f .env

      - name: 게시 원장(published.json) 커밋백
        run: |
          git config user.name "leerness-bot"
          git config user.email "noreply@leerness.com"
          git add data/published.json || true
          git commit -m "chore: update published.json [skip ci]" || echo "변경 없음"
          git push || echo "push 생략"
