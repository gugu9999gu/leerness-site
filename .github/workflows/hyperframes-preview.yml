name: hyperframes preview (검증용)

# UR-0034 단계적 전환 Phase 2: hyperframes 로 렌더 → verify-video 게이트 → MP4 를 아티팩트로 업로드(YouTube 미업로드).
# Remotion 프로덕션 파이프라인(release-pipeline.yml)은 건드리지 않음. 품질(한글/BGM/9:16) 입증용 수동 실행.
on:
  workflow_dispatch:
    inputs:
      version:
        description: '특정 버전만 렌더(비우면 최신 important N개)'
        default: ''
      limit:
        description: '렌더 최대 수'
        default: '1'

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # hyperframes 는 Node 22+

      - name: FFmpeg 설치 (hyperframes 렌더 필수)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: CHANGELOG 가져오기 (leerness 레포 — API raw, CDN 캐시 우회)
        run: |
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.raw" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/gugu9999gu/leerness/contents/CHANGELOG.md" -o CHANGELOG.source.md \
            || curl -fsSL "https://raw.githubusercontent.com/gugu9999gu/leerness/main/CHANGELOG.md?cb=$(date +%s)" -o CHANGELOG.source.md
          head -1 CHANGELOG.source.md

      - name: 파싱 (titlePlain/videoHighlights 생성)
        run: node pipeline/parse-changelog.cjs --changelog ./CHANGELOG.source.md

      - name: hyperframes 환경 점검 (Chrome 등)
        run: npx -y hyperframes@latest doctor || true

      - name: hyperframes 렌더 (KO+EN)
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            node pipeline/render-shorts-hf.cjs --version "${{ github.event.inputs.version }}" --limit ${{ github.event.inputs.limit || '1' }}
          else
            node pipeline/render-shorts-hf.cjs --limit ${{ github.event.inputs.limit || '1' }}
          fi

      - name: 영상 검증 (content·BGM·효과음·스트림 — hyperframes 산출물)
        run: node pipeline/verify-video.cjs --rendered data/rendered-hf.json --limit 8

      - name: 프레임 추출 (한글 폰트/레이아웃 시각 검증용 PNG)
        if: always()
        run: |
          mkdir -p video-hf/frames
          for mp4 in video-hf/out/*.mp4; do
            [ -f "$mp4" ] || continue
            base=$(basename "$mp4" .mp4)
            ffmpeg -y -ss 12.5 -i "$mp4" -frames:v 1 "video-hf/frames/${base}-update.png" 2>/dev/null || true   # update 씬(릴리스별 내용)
            ffmpeg -y -ss 7.0  -i "$mp4" -frames:v 1 "video-hf/frames/${base}-benefits.png" 2>/dev/null || true  # benefits 씬(한글)
          done
          ls -la video-hf/frames || true

      - name: MP4 + 프레임 아티팩트 업로드 (다운로드해 품질 확인)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyperframes-mp4
          path: |
            video-hf/out/*.mp4
            video-hf/frames/*.png
          if-no-files-found: warn
